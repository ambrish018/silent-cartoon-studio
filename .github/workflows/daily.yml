name: daily-cartoon

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  make-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out project files
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node packages
        run: npm install && npm install @remotion/lambda@4.0.477

      - name: Install Python packages
        run: |
          pip install anthropic boto3 \
                      google-api-python-client \
                      google-auth-httplib2 \
                      google-auth-oauthlib

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Pick today's genre
        run: echo "GENRE=$(python3 scripts/pick_genre.py)" >> $GITHUB_ENV

      - name: Step 1 - Generate story
        run: python3 scripts/gen_beatsheet.py "$GENRE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Step 2 - Render animation
        run: |
          GENRE_CAP="$(echo ${GENRE:0:1} | tr '[:lower:]' '[:upper:]')${GENRE:1}"
          npx remotion lambda render \
            ${{ secrets.REMOTION_SERVE_URL }} \
            "$GENRE_CAP" \
            --out out/${GENRE}_silent.mp4 \
            --frames-per-lambda=600 \
            --concurrency-per-lambda=1 \
            --timeout=240
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Step 3 - Generate music
        run: python3 scripts/gen_music.py
