name: daily-cartoon

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

jobs:
  make-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out project files
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node packages
        run: npm install && npm install @remotion/lambda@4.0.477

      - name: Install Python packages
        run: pip install anthropic boto3 google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Install ffmpeg and AWS CLI
        run: sudo apt-get update && sudo apt-get install -y ffmpeg awscli

      - name: Pick today's genre
        run: echo "GENRE=$(python3 scripts/pick_genre.py)" >> $GITHUB_ENV

      - name: Step 1 - Generate story
        run: python3 scripts/gen_beatsheet.py "$GENRE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Step 2 - Render animation
        run: |
          mkdir -p out
          GENRE_CAP="$(echo ${GENRE:0:1} | tr '[:lower:]' '[:upper:]')${GENRE:1}"
          S3_URL=$(npx remotion lambda render \
            ${{ secrets.REMOTION_SERVE_URL }} \
            "$GENRE_CAP" \
            --frames-per-lambda=600 \
            --concurrency-per-lambda=1 \
            --timeout=240000 \
            --function-name=remotion-render-4-0-477-mem3008mb-disk2048mb-240sec \
            2>&1 | grep "+ S3" | awk '{print $3}')
          echo "S3 URL: $S3_URL"
          echo "Downloading video from S3..."
          aws s3 cp "$S3_URL" out/${GENRE}_silent.mp4
          echo "Video file size:"
          ls -lh out/${GENRE}_silent.mp4
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Step 3 - Generate music
        run: |
          echo "FAL_KEY length: ${#FAL_KEY}"
          python3 scripts/gen_music.py "$GENRE"
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}

      - name: Step 4 - Mix video and audio
        run: python3 scripts/finish.py "$GENRE"

      - name: Step 5 - Generate metadata
        run: python3 scripts/gen_meta.py "$GENRE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Step 6 - Upload to Cloudflare R2
        run: python3 scripts/upload_r2.py "$GENRE"
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      - name: Step 7 - Publish to YouTube
        run: python3 scripts/publish_youtube.py "$GENRE"
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
